<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preload" href="/Fonts/romie-medium.woff2" as="font" type="font/woff2" crossorigin />
    <title>Samantha's Portfolio</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        overflow-x: clip;
        overflow-y: visible;
        height: 100%;
      }

      body {
        background: #F7F8F9;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        min-height: 100vh;
        overflow-x: clip;
        overflow-y: visible;
      }

      #app-root {
        overflow-x: clip;
        overflow-y: visible;
      }

      /* Globe container: fixed pixel sizes at breakpoints so WebGL always gets valid dimensions */
      #globe {
        width: 620px;
        height: 620px;
        position: relative;
        overflow: visible !important;
        flex-shrink: 0;
      }

      #globe canvas {
        display: block;
        width: 100%;
        height: 100%;
        overflow: visible !important;
      }

      /* Marker Animations */
      @keyframes marker-pulse {
        0%, 100% { 
          transform: scale(1);
        }
        50% { 
          transform: scale(1.15);
        }
      }

      .myMarker {
        cursor: pointer;
        user-select: none;
        width: 44px;
        height: 44px;
        margin: -22px;
        pointer-events: auto;
      }

      .myMarker svg {
        animation: marker-pulse 2.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        width: 100%;
        height: 100%;
        transform-origin: center center;
      }

      .myMarker:hover svg {
        animation-play-state: paused;
        transform: scale(1.2);
      }

      /* Responsive globe + markers: shrink #globe at breakpoints to match .main__globe */
      @media (max-width: 1400px) {
        #globe { width: 580px; height: 580px; }
        .myMarker { width: 42px; height: 42px; margin: -21px; }
      }
      @media (max-width: 1300px) {
        #globe { width: 520px; height: 520px; }
      }
      @media (max-width: 1200px) {
        #globe { width: 500px; height: 500px; }
        .myMarker { width: 40px; height: 40px; margin: -20px; }
      }
      @media (max-width: 1100px) {
        #globe { width: 440px; height: 440px; }
      }
      /* Stacked hero: globe must stay smaller than viewport (was 520px — too wide on phones) */
      @media (max-width: 1024px) {
        #globe { width: min(460px, 92vw); height: min(460px, 92vw); }
        .myMarker { width: 38px; height: 38px; margin: -19px; }
      }
      @media (max-width: 768px) {
        #globe { width: min(380px, 92vw); height: min(380px, 92vw); }
        .myMarker { width: 34px; height: 34px; margin: -17px; }
      }
      @media (max-width: 480px) {
        #globe { width: min(330px, 90vw); height: min(330px, 90vw); }
        .myMarker { width: 30px; height: 30px; margin: -15px; }
      }
    </style>
  </head>
  <body>
    <!-- React App Root -->
    <div id="app-root"></div>

    <!-- Globe (will be moved by React) -->
    <div id="globe"></div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
